name: Bug report
description: Report a bug with IntiDev AgentLoops
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Repro command
      description: Relevant command and output
    validations:
      required: false
